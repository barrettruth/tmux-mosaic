name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: spark
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: nix develop .#ci --command just format
  lint:
    name: Lint
    runs-on: spark
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: nix develop .#ci --command just lint
  test:
    name: Test
    runs-on: spark
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: nix develop .#ci --command just test
