name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux bats
      - name: Show versions
        run: |
          tmux -V
          bats --version
      - name: Run integration tests
        run: bats tests/integration
